<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#0F2040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A020;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1E5FA8;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="180" fill="url(#glow)"/>
  <!-- Music note icon -->
  <g transform="translate(340, 140)" fill="#E8A020" opacity="0.85">
    <rect x="30" y="0" width="8" height="60" rx="4"/>
    <rect x="55" y="10" width="8" height="60" rx="4"/>
    <rect x="30" y="0" width="35" height="8" rx="4"/>
    <ellipse cx="22" cy="60" rx="14" ry="10" transform="rotate(-10, 22, 60)"/>
    <ellipse cx="47" cy="70" rx="14" ry="10" transform="rotate(-10, 47, 70)"/>
  </g>
  <!-- Stars -->
  <circle cx="150" cy="80" r="2" fill="#E8A020" opacity="0.4"/>
  <circle cx="650" cy="120" r="3" fill="#E8A020" opacity="0.3"/>
  <circle cx="700" cy="300" r="2" fill="#1E5FA8" opacity="0.5"/>
  <circle cx="100" cy="320" r="2.5" fill="#E8A020" opacity="0.35"/>
  <circle cx="580" cy="60" r="1.5" fill="#fff" opacity="0.4"/>
  <!-- Text -->
  <text x="400" y="305" font-family="Georgia, serif" font-size="18" fill="#E8A020" text-anchor="middle" opacity="0.9" letter-spacing="3">ZONE-CHRÉTIEN</text>
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">Gospel &amp; Musique Chrétienne</text>
</svg>
