<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8A020;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#E8A020;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="120" fill="url(#glow)"/>
  <!-- Note de musique stylisée -->
  <g transform="translate(155, 130)" fill="#E8A020" opacity="0.7">
    <rect x="50" y="0" width="12" height="90" rx="6"/>
    <rect x="50" y="0" width="50" height="12" rx="6"/>
    <ellipse cx="32" cy="90" rx="22" ry="16" transform="rotate(-15, 32, 90)"/>
  </g>
  <text x="200" y="330" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="2">ZONE-CHRÉTIEN</text>
</svg>
